<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculating Density Quiz</title>
  <style>
    :root {
      --bg1: #f0f4ff;
      --bg2: #e8fff7;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-contrast: #fff;
      --secondary: #059669;
      --muted: #6b7280;
      --danger: #ef4444;
      --success: #10b981;
      --text-dark: #0f172a;
    }
    
    * { box-sizing: border-box; }
    
    html, body { height: 100%; margin: 0; }
    
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .app-container {
      display: flex;
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(16, 24, 40, 0.1);
      backdrop-filter: blur(10px);
      overflow: hidden;
      flex-direction: column;
    }

    @media (min-width: 640px) {
      .app-container { flex-direction: row; }
    }

    /* Left Panel: Visuals & Formula */
    .panel-left {
      flex: 1;
      background: #ffffff;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #e2e8f0;
    }

    .formula-box {
      background: var(--bg1);
      border: 2px dashed var(--primary);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
      width: 100%;
    }
    .formula-box h3 { margin: 0 0 0.5rem 0; color: var(--primary); font-size: 1.1rem; }
    .formula-box p { margin: 0; font-size: 1.25rem; font-weight: bold; color: var(--text-dark); }
    .formula-box small { color: var(--muted); font-size: 0.85rem; display: block; margin-top: 0.5rem; }

    /* The irregular shape simulation */
    .blob-container {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .blob {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: var(--primary);
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      animation: morph 4s ease-in-out infinite alternate;
      transition: background-color 0.5s ease;
      box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
    }

    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    }

    /* Right Panel: Quiz Area */
    .panel-right {
      flex: 1.2;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .quiz-header h2 { margin: 0; font-size: 1.5rem; }
    .progress { color: var(--muted); font-weight: bold; }

    .question-text {
      font-size: 1.15rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      min-height: 80px;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input[type="number"], select {
      padding: 0.85rem;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--primary);
    }

    input[type="number"] { flex: 2; }
    select { flex: 1; cursor: pointer; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      border: 0;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--primary-contrast);
      width: 100%;
    }
    
    .btn-primary { background: var(--primary); box-shadow: 0 4px 14px rgba(37,99,235,0.2); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .feedback {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .feedback.success { display: block; background: #d1fae5; color: var(--success); }
    .feedback.error { display: block; background: #fee2e2; color: var(--danger); }

    /* Results Screen */
    #results-screen { display: none; text-align: center; }
    .grade-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0 auto 1.5rem auto;
      box-shadow: 0 10px 20px rgba(37,99,235,0.3);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Left Panel: Reference & Visuals -->
    <div class="panel-left">
      <div class="formula-box">
        <h3>Density Formula</h3>
        <p>Density = <span style="display:inline-block; vertical-align:middle; text-align:center;">
            <span style="border-bottom:2px solid; display:block;">Mass</span>
            Volume
          </span>
        </p>
        <small>d = m / v</small>
      </div>

      <div class="blob-container">
        <div class="blob" id="material-blob"></div>
        <span style="position: absolute; color: white; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">Object</span>
      </div>
    </div>

    <!-- Right Panel: Quiz Logic -->
    <div class="panel-right">
      
      <!-- Active Quiz Section -->
      <div id="quiz-screen">
        <div class="quiz-header">
          <h2>Density Quiz</h2>
          <span class="progress" id="progress-text">1 / 5</span>
        </div>

        <div class="question-text" id="question-text">
          Loading question...
        </div>

        <div class="input-group">
          <input type="number" id="answer-input" placeholder="Enter number..." step="0.1">
          <select id="unit-input">
            <option value="" disabled selected>Unit</option>
            <option value="g">g (Mass)</option>
            <option value="cm³">cm³ (Volume)</option>
            <option value="g/cm³">g/cm³ (Density)</option>
          </select>
        </div>

        <button class="btn btn-primary" id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
        <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">Next Question</button>

        <div id="feedback-msg" class="feedback"></div>
      </div>

      <!-- Results Section -->
      <div id="results-screen">
        <h2>Quiz Complete!</h2>
        <div class="grade-circle" id="final-score">5/5</div>
        <p style="margin-bottom: 2rem; color: var(--muted); font-size: 1.1rem;" id="grade-message">Great job!</p>
        <div style="display: flex; gap: 1rem;">
          <button class="btn btn-primary" onclick="startQuiz()">Retry Quiz</button>
          <button class="btn btn-primary" style="background: var(--muted);" onclick="window.location.href='quiz_menu.html'">Back to Menu</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const TOTAL_QUESTIONS = 5;
    let currentQuestionIndex = 0;
    let score = 0;
    let currentProblem = {};

    // Colors to simulate different materials for the blob
    const materialColors = ["#2563eb", "#059669", "#d97706", "#7c3aed", "#db2777", "#ea580c"];

    function generateProblem() {
      // Generate volume: 2 to 20 cm³ (whole numbers for simplicity)
      let v = Math.floor(Math.random() * 19) + 2; 
      // Generate density: 0.5 to 10.0 g/cm³ (1 decimal)
      let d = parseFloat((Math.random() * 9.5 + 0.5).toFixed(1));
      // Calculate mass: v * d (will automatically have max 1 decimal)
      let m = parseFloat((v * d).toFixed(1));

      // Decide what to solve for (0: Density, 1: Mass, 2: Volume)
      const type = Math.floor(Math.random() * 3);
      
      let question = "";
      let answerVal = 0;
      let answerUnit = "";

      if (type === 0) {
        question = `An irregular object has a mass of <b>${m} g</b> and displaces a volume of <b>${v} cm³</b>. <br><br>What is its density?`;
        answerVal = d;
        answerUnit = "g/cm³";
      } else if (type === 1) {
        question = `An object has a density of <b>${d} g/cm³</b> and a volume of <b>${v} cm³</b>. <br><br>What is its mass?`;
        answerVal = m;
        answerUnit = "g";
      } else {
        question = `An object has a mass of <b>${m} g</b> and a density of <b>${d} g/cm³</b>. <br><br>What is its volume?`;
        answerVal = v;
        answerUnit = "cm³";
      }

      return { question, answerVal, answerUnit };
    }

    function loadQuestion() {
      currentProblem = generateProblem();
      
      // Update UI
      document.getElementById('question-text').innerHTML = currentProblem.question;
      document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS}`;
      
      // Reset inputs and feedback
      document.getElementById('answer-input').value = "";
      document.getElementById('unit-input').value = "";
      document.getElementById('feedback-msg').className = "feedback";
      document.getElementById('feedback-msg').style.display = "none";
      
      // Toggle buttons
      document.getElementById('submit-btn').classList.remove('hidden');
      document.getElementById('next-btn').classList.add('hidden');

      // Change blob color
      const randomColor = materialColors[Math.floor(Math.random() * materialColors.length)];
      document.getElementById('material-blob').style.backgroundColor = randomColor;
    }

    function checkAnswer() {
      const userVal = parseFloat(document.getElementById('answer-input').value);
      const userUnit = document.getElementById('unit-input').value;
      const feedbackEl = document.getElementById('feedback-msg');

      if (isNaN(userVal) || userUnit === "") {
        feedbackEl.innerText = "Please enter a number and select a unit.";
        feedbackEl.className = "feedback error";
        return;
      }

      // Check if value matches (allow slight float precision tolerance)
      const isValCorrect = Math.abs(userVal - currentProblem.answerVal) < 0.05;
      const isUnitCorrect = userUnit === currentProblem.answerUnit;

      if (isValCorrect && isUnitCorrect) {
        feedbackEl.innerText = "Correct! Great job.";
        feedbackEl.className = "feedback success";
        score++;
      } else if (!isValCorrect && isUnitCorrect) {
        feedbackEl.innerHTML = `Incorrect calculation. <br>The correct answer was <b>${currentProblem.answerVal} ${currentProblem.answerUnit}</b>.`;
        feedbackEl.className = "feedback error";
      } else if (isValCorrect && !isUnitCorrect) {
        feedbackEl.innerHTML = `Right number, wrong unit! <br>The correct answer was <b>${currentProblem.answerVal} ${currentProblem.answerUnit}</b>.`;
        feedbackEl.className = "feedback error";
      } else {
        feedbackEl.innerHTML = `Incorrect. <br>The correct answer was <b>${currentProblem.answerVal} ${currentProblem.answerUnit}</b>.`;
        feedbackEl.className = "feedback error";
      }

      // Toggle buttons
      document.getElementById('submit-btn').classList.add('hidden');
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < TOTAL_QUESTIONS) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = "none";
      document.getElementById('results-screen').style.display = "block";
      
      document.getElementById('final-score').innerText = `${score}/${TOTAL_QUESTIONS}`;
      
      let msg = "";
      if (score === 5) msg = "Perfect score! You are a density master!";
      else if (score >= 3) msg = "Good job! Keep practicing to get a perfect score.";
      else msg = "You might need to review the density formula and try again!";
      
      document.getElementById('grade-message').innerText = msg;
    }

    function startQuiz() {
      score = 0;
      currentQuestionIndex = 0;
      document.getElementById('quiz-screen').style.display = "block";
      document.getElementById('results-screen').style.display = "none";
      loadQuestion();
    }

    // Initialize the quiz on page load
    window.onload = startQuiz;

  </script>
</body>
</html>
