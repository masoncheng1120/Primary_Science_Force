<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Menu — Online Learning</title>
  <style>
    :root {
      --bg1: #f0f4ff;
      --bg2: #e8fff7;
      --primary: #2563eb;
      --primary-contrast: #fff;
      --secondary: #059669;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .menu {
      text-align: center;
      padding: 3rem 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 30px rgba(16,24,40,0.08);
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.8);
      max-width: 720px;
      width: 100%;
    }
    .title {
      margin: 0 0 0.5rem 0;
      font-size: clamp(1.5rem, 3.2vw, 2.5rem);
      letter-spacing: 0.2px;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.25rem;
      border: 0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
      text-decoration: none;
    }
    .btn svg { display: block; }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--primary); color: var(--primary-contrast); box-shadow: 0 6px 18px rgba(37,99,235,0.18); }
    .btn-secondary { background: var(--secondary); color: var(--primary-contrast); box-shadow: 0 6px 18px rgba(5,150,105,0.12); }
    .btn-outline { background: #f3f4f6; color: #0f172a; border: 1px solid #e2e8f0; margin-top: 2rem; }
    
    @media (max-width: 420px) {
      .buttons { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="menu">
    <h1 class="title">Quiz Menu</h1>
    <p class="subtitle">Select a quiz topic.</p>

    <div class="buttons" role="navigation" aria-label="Quiz menu">
      <a class="btn btn-primary" href="potential_kinetic.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
        </svg>
        Potential & Kinetic Energy
      </a>
      <a class="btn btn-secondary" href="friction.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v20"></path><path d="m17 5-5-3-5 3"></path><path d="m17 19-5 3-5-3"></path>
        </svg>
        Friction
      </a>
    </div>

    <div>
      <a class="btn btn-outline" href="index.html">Back to Home</a>
    </div>
  </main>
</body>
</html>
